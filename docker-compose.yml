services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orchestrator
    restart: unless-stopped

    volumes:
      # ホストの Docker デーモンを操作するためのソケット (サンドボックス起動に必要)
      - /var/run/docker.sock:/var/run/docker.sock

      # OpenCode 設定ディレクトリ (読み取り専用マウント)
      # ~/.opencode/ にはバイナリ (bin/opencode) とプラグインが含まれる
      - ${HOME}/.opencode:/root/.opencode:ro
      - ${HOME}/.config/opencode:/root/.config/opencode:ro

      # 設定ファイル
      - ./config.yaml:/app/config.yaml:ro

      # サンドボックスの作業ディレクトリ (ホストと共有)
      - /tmp/orchestrator-work:/tmp/orchestrator-work

    environment:
      # 認証情報はすべて config.yaml の credentials セクションで管理します
      # 環境変数での上書きが必要な場合のみここに記述してください
      - CONFIG_FILE=/app/config.yaml

    # webhook モードの場合はポートを開放 (polling モードでは不要)
    ports:
      - "${WEBHOOK_PORT:-8080}:8080"

    # ヘルスチェック (webhook モードのみ有効)
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
