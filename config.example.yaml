# ============================================================
# Orchestrator 設定ファイルのサンプル
# コピーして config.yaml にリネームして使用してください
# ============================================================

# 監視対象リポジトリ (owner/repo 形式)
repositories:
  - "your-org/your-repo"
  # - "your-org/another-repo"

# 動作モード: "polling" または "webhook"
mode: "polling"

# 最大並行タスク数 (同時に処理する Issue の最大数)
max_concurrent_tasks: 2

# ラベル設定
labels:
  trigger: "ai-task"      # このラベルが付いた Issue を処理対象とする
  running: "ai-running"   # 処理中
  done: "ai-done"         # 完了
  fail: "ai-fail"         # 失敗
  pr_generated: "ai-generated"  # 作成した PR に付与するラベル

# Polling モードの設定
polling:
  interval_sec: 300  # 5分ごとにポーリング (最小: 30秒)

# Webhook モードの設定
webhook:
  host: "0.0.0.0"
  port: 8080
  path: "/webhook"
  # secret は credentials.webhook_secret で設定してください

# Docker サンドボックスの設定
sandbox:
  image: "orchestrator-sandbox:latest"
  memory_limit: "4g"
  cpu_count: 2
  pids_limit: 256
  timeout_sec: 1800  # 30分
  work_dir_host: "/tmp/orchestrator-work"
  # ネットワーク許可ホスト (空リストにするとフル許可 - 開発時のみ推奨)
  allowed_hosts:
    - "github.com"
    - "api.github.com"
    - "objects.githubusercontent.com"
    - "api.anthropic.com"
    - "api.openai.com"
    - "api.gemini.com"
    - "generativelanguage.googleapis.com"
    - "openrouter.ai"  # OpenRouter 使用時に追加
    - "copilot-proxy.githubusercontent.com"  # GitHub Copilot CLI 使用時に必須

# エージェント設定
agent:
  # 使用するエージェント: "opencode" または "copilot"
  use: "opencode"

  # OpenCode CLI の設定 (use: "opencode" 時に有効)
  opencode:
    model: ""  # 空の場合は .opencode.json のデフォルトモデルを使用
    # モデル指定例:
    #   Anthropic:  "anthropic/claude-sonnet-4-5"
    #   OpenAI:     "openai/gpt-4o"
    #   Google:     "google/gemini-2.0-flash"
    #   OpenRouter: "openrouter/anthropic/claude-sonnet-4-5"

    # 使用する AI プロバイダの API キー (いずれか1つ必須)
    anthropic_api_key: ""      # sk-ant-api03-...
    anthropic_auth_token: ""   # anthropic_api_key の代替
    openai_api_key: ""         # sk-...
    openai_org_id: ""          # org-... (オプション)
    google_api_key: ""         # AIza...
    openrouter_api_key: ""     # sk-or-v1-...

  # GitHub Copilot CLI の設定 (use: "copilot" 時に有効)
  # 認証: GitHub Settings で Fine-grained PAT を発行し、
  #          "Copilot Requests" 権限を付与して copilot_github_token に設定
  # 注意: Classic PAT (ghp_) は不可。Fine-grained PAT (github_pat_) のみ対応
  # 注意: `copilot login` の OAuth トークンは不可 (キーチェーン保存で環境変数で渡せない)
  copilot:
    model: ""  # 空の場合は Copilot のデフォルトモデル (Claude Sonnet 4.5) を使用
    max_autopilot_continues: 20  # 最大自律継続ステップ数 (暴走防止)
    copilot_github_token: ""   # github_pat_...

# PR の設定
pr:
  draft: true  # true: Draft PR として作成 (デフォルト), false: 通常の PR として作成
  # base_branch: "main"  # 省略時はリポジトリのデフォルトブランチを使用

# 認証ファイルのパス (コンテナにマウントされる)
auth:
  opencode_dir: "~/.opencode"
  opencode_config_dir: "~/.config/opencode"

# ============================================================
# 認証情報 (.env は廃止済み。このセクションに統合)
# config.yaml は .gitignore 対象のため、シークレットを直接記載できます
# ============================================================
credentials:
  # GitHub 連携 (必須)
  # Fine-grained PAT または Classic PAT (repo + issues 権限が必要)
  github_token: "ghp_your_github_token"

  # Webhook シークレット (webhook モード時に必須。polling モードでは不要)
  webhook_secret: ""
